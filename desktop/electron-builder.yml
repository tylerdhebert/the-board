appId: board.the.tutor
productName: The Board
directories:
  output: release
  buildResources: build
files:
  - main.mjs
  - preload.cjs
  - windowState.mjs
  - build/icon.png
  - package.json
extraResources:
  - from: dist-server/server.cjs
    to: server/server.cjs
  - from: ../web/dist
    to: web-dist
  - from: ../cards
    to: seed-cards
    filter:
      - '*.card.json'
      - '*.snippets.json'
  - from: ../server/node_modules/pyright
    to: pyright
  - from: ../prompts
    to: prompts
  - from: ../schema.json
    to: schema.json
win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
asar: true
